name: profile-readme

on:
  schedule:
    - cron: "0 3 * * *"   # daily, 3am UTC
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-panels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pillow

      - name: Rebuild ASCII typing SVG
        run: |
          python scripts/photo_to_ascii.py assets/photo.png --width 70
          python scripts/build_typing_svg.py

      - name: Rebuild neofetch panel
        run: python scripts/build_neofetch_svg.py

      - name: Commit updated panels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ascii_typing.svg assets/neofetch.svg
          git diff --staged --quiet || git commit -m "chore: refresh profile panels"
          git push

  contribution-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
